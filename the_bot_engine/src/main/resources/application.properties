spring.application.name=bot-engine
server.port=8100
the.bot.configFile=${BOT_CONFIG_FILE:}
the.bot.runtimeDir=./runtime/
the.bot.dataDir=./runtime/data/
the.bot.logDir=./runtime/logs/
the.bot.webPublicBaseUrl=${THE_BOT_WEB_PUBLIC_BASE_URL:http://localhost:8091}
the.bot.rest.bot-io-base-url=${THE_BOT_REST_BOT_IO_BASE_URL:http://bot-io:8090}
the.bot.rest.bot-web-base-url=${THE_BOT_REST_BOT_WEB_BASE_URL:http://bot-web:8091}
the.bot.internal-api-token=${THE_BOT_INTERNAL_API_TOKEN:}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
logging.level.org.freakz=DEBUG
the.bot.urls.max-urls-per-message=${THE_BOT_URLS_MAX_URLS_PER_MESSAGE:2}
the.bot.urls.max-response-bytes=${THE_BOT_URLS_MAX_RESPONSE_BYTES:1048576}
the.bot.urls.max-redirects=${THE_BOT_URLS_MAX_REDIRECTS:3}
the.bot.urls.connect-timeout-millis=${THE_BOT_URLS_CONNECT_TIMEOUT_MILLIS:3000}
the.bot.urls.read-timeout-millis=${THE_BOT_URLS_READ_TIMEOUT_MILLIS:5000}
the.bot.urls.cache-maximum-size=${THE_BOT_URLS_CACHE_MAXIMUM_SIZE:5000}
the.bot.urls.success-cache-duration=${THE_BOT_URLS_SUCCESS_CACHE_DURATION:6h}
the.bot.urls.failure-cache-duration=${THE_BOT_URLS_FAILURE_CACHE_DURATION:5m}
the.bot.water.index-cache-ttl=${THE_BOT_WATER_INDEX_CACHE_TTL:24h}
the.bot.water.index-refresh-interval=${THE_BOT_WATER_INDEX_REFRESH_INTERVAL:6h}
the.bot.water.index-refresh-interval-ms=${THE_BOT_WATER_INDEX_REFRESH_INTERVAL_MS:21600000}
the.bot.water.index-warmup-delay=${THE_BOT_WATER_INDEX_WARMUP_DELAY:30000}
the.bot.water.request-timeout=${THE_BOT_WATER_REQUEST_TIMEOUT:5s}
the.bot.water.region-parallelism=${THE_BOT_WATER_REGION_PARALLELISM:8}
the.bot.water.image-cache-ttl=${THE_BOT_WATER_IMAGE_CACHE_TTL:15m}
the.bot.urls.youtube.enabled=${THE_BOT_URLS_YOUTUBE_ENABLED:true}
the.bot.urls.youtube.api-key=${YOUTUBE_API_KEY:}
the.bot.urls.wikipedia.enabled=${THE_BOT_URLS_WIKIPEDIA_ENABLED:true}
