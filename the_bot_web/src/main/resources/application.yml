server:
  port: 8091

spring:
  application:
    name: the_bot_web
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:the_bot_web/frontend/dist/
        - file:frontend/dist/

the-bot-web:
  users-file: ${THE_BOT_WEB_USERS_FILE:runtime/data/users.json}
  bot-io-base-url: ${THE_BOT_WEB_BOT_IO_BASE_URL:http://localhost:8090}
  bot-engine-base-url: ${THE_BOT_WEB_BOT_ENGINE_BASE_URL:http://localhost:8100}
  docker-status-enabled: ${THE_BOT_WEB_DOCKER_STATUS_ENABLED:false}
  docker-host: ${THE_BOT_WEB_DOCKER_HOST:unix:///var/run/docker.sock}
  bot-web-container-name: ${THE_BOT_WEB_BOT_WEB_CONTAINER_NAME:bot-web}
  bot-io-container-name: ${THE_BOT_WEB_BOT_IO_CONTAINER_NAME:bot-io}
  bot-engine-container-name: ${THE_BOT_WEB_BOT_ENGINE_CONTAINER_NAME:bot-engine}
  bot-openclaw-container-name: ${THE_BOT_WEB_BOT_OPENCLAW_CONTAINER_NAME:bot-openclaw}
  bot-whatsapp-container-name: ${THE_BOT_WEB_BOT_WHATSAPP_CONTAINER_NAME:bot-whatsapp}
  openclaw-deployment-mode: ${OPENCLAW_DEPLOYMENT_MODE:external}
  openclaw-gateway-ws-url: ${OPENCLAW_GATEWAY_WS_URL:ws://ubuntu-server.local:18889}
  openclaw-health-url: ${THE_BOT_WEB_OPENCLAW_HEALTH_URL:${OPENCLAW_HEALTH_URL:}}
  internal-api-token: ${THE_BOT_INTERNAL_API_TOKEN:}
  mobile-auth-file: ${THE_BOT_WEB_MOBILE_AUTH_FILE:runtime/data/mobile-auth.json}
  mobile-notifications-file: ${THE_BOT_WEB_MOBILE_NOTIFICATIONS_FILE:runtime/data/mobile-notifications.json}
  mobile-access-token-seconds: ${THE_BOT_WEB_MOBILE_ACCESS_TOKEN_SECONDS:900}
  mobile-refresh-token-days: ${THE_BOT_WEB_MOBILE_REFRESH_TOKEN_DAYS:30}
  mobile-fcm-enabled: ${THE_BOT_WEB_MOBILE_FCM_ENABLED:false}
  mobile-fcm-credentials-file: ${THE_BOT_WEB_MOBILE_FCM_CREDENTIALS_FILE:}

the:
  bot:
    configFile: ${BOT_CONFIG_FILE:}
    runtimeDir: ./runtime/
    dataDir: ./runtime/data/
    logDir: ./runtime/logs/
    rest:
      bot-io-base-url: ${THE_BOT_WEB_BOT_IO_BASE_URL:http://localhost:8090}
      bot-engine-base-url: ${THE_BOT_WEB_BOT_ENGINE_BASE_URL:http://localhost:8100}
      bot-web-base-url: ${THE_BOT_REST_BOT_WEB_BASE_URL:http://localhost:8091}
    internal-api-token: ${THE_BOT_INTERNAL_API_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
