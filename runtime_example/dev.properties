hokan.runtime.profile=DEV
the.bot.runtimeDir=./
the.bot.dataDir=./data/
the.bot.logDir=./logs/
the.bot.runtimeConfigFile=./DEV.the_bot_config.json
hokan.ai.openclaw.hooks.token=${OPENCLAW_HOOKS_TOKEN}
openclaw.gateway-token=${OPENCLAW_GATEWAY_TOKEN:}
openclaw.gateway-ws-url=${OPENCLAW_GATEWAY_WS_URL:ws://localhost:18899}
openclaw.gateway-ws-origin=${OPENCLAW_GATEWAY_WS_ORIGIN:http://localhost:18899}
openclaw.ws-timeout-seconds=${OPENCLAW_WS_TIMEOUT_SECONDS:300}
openclaw.wait-reply-timeout-seconds=45
openclaw.ws-client-id=gateway-client
openclaw.ws-client-mode=backend
openclaw.ws-client-platform=linux
openclaw.state-dir-host=${OPENCLAW_STATE_DIR_HOST:./openclaw/state}
openclaw.node-context-secret=${OPENCLAW_NODE_CONTEXT_SECRET:}
openclaw.node-bridge-enabled=true
openclaw.runtime-log-root=${OPENCLAW_RUNTIME_LOG_ROOT:/workspace/runtime/logs}
openclaw.runtime-log-root-local=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:./runtime/logs}
weather.api-key=${WEATHER_API_KEY}
weather.api-url=${WEATHER_API_URL:http://api.weatherapi.com/v1}
channel.do.url.topic=
channel.do.sys.notify=
