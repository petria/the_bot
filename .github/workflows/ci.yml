name: CI - Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      REGISTRY: ghcr.io
      IMAGE_ENGINE: ghcr.io/${{ github.repository }}-engine
      IMAGE_IO: ghcr.io/${{ github.repository }}-io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect component changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          echo "$CHANGED_FILES"

          engine_changed=false
          io_changed=false

          if echo "$CHANGED_FILES" | grep -Eq '^(the_bot_engine/|the_bot_common/|pom\.xml$|docker-compose\.yml$|env/|\.github/workflows/)'; then
            engine_changed=true
          fi

          if echo "$CHANGED_FILES" | grep -Eq '^(the_bot_io/|the_bot_common/|pom\.xml$|docker-compose\.yml$|env/|\.github/workflows/)'; then
            io_changed=true
          fi

          echo "engine=$engine_changed" >> "$GITHUB_OUTPUT"
          echo "io=$io_changed" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: Log in to the GitHub Container Registry
        if: ${{ steps.changes.outputs.engine == 'true' || steps.changes.outputs.io == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot-engine image
        if: ${{ steps.changes.outputs.engine == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./the_bot_engine
          file: ./the_bot_engine/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_ENGINE }}:${{ github.sha }}
            ${{ env.IMAGE_ENGINE }}:latest

      - name: Build and push bot-io image
        if: ${{ steps.changes.outputs.io == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./the_bot_io
          file: ./the_bot_io/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_IO }}:${{ github.sha }}
            ${{ env.IMAGE_IO }}:latest

      - name: Write deploy metadata
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          cat > deploy-meta.json << 'EOF'
          {
            "sha": "${{ github.sha }}",
            "engine_changed": "${{ steps.changes.outputs.engine }}",
            "io_changed": "${{ steps.changes.outputs.io }}"
          }
          EOF

      - name: Upload deploy metadata artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: deploy-meta-${{ github.sha }}
          path: deploy-meta.json
          retention-days: 7
