services:
  # Hokan dedicated OpenClaw container
  bot-openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/openclaw/state:/state
      - ${HOKAN_DATA_DIR:-.}/openclaw/workspace:/workspace
      - ${HOKAN_DATA_DIR:-.}/openclaw/config:/config
      - ${HOKAN_DATA_DIR:-.}/openclaw/logs:/logs
      - ${HOKAN_DATA_DIR:-.}/runtime:/workspace/runtime
    ports:
      - "127.0.0.1:${OPENCLAW_HOST_PORT:-18899}:18889"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18889/health >/dev/null"]
      interval: 3m
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - TZ=Europe/Helsinki
      - HOME=/state
      - NPM_CONFIG_CACHE=/state/.npm
      - XDG_CACHE_HOME=/state/.cache
      - OPENCLAW_STATE_DIR=/state
      - OPENCLAW_WORKSPACE_DIR=/workspace
      - OPENCLAW_CONFIG_PATH=/config/config.json
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_AUTH_PROFILE_SECRET_KEY=${OPENCLAW_AUTH_PROFILE_SECRET_KEY:-${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}}
    container_name: bot-openclaw

  # Hokan the Bot engine container
  bot-engine:
    image: ghcr.io/petria/the_bot-engine:${ENGINE_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
      - ${HOKAN_DATA_DIR:-.}/openclaw/state:/openclaw-state
    ports:
      - "127.0.0.1:8100:8100"
    extra_hosts:
      - "ubuntu-server:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
      - "ubuntu-server.local:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - HOKAN_BOT_INSTANCE_ID=${HOKAN_BOT_INSTANCE_ID:-dev}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://bot-openclaw:18889}
      - OPENCLAW_GATEWAY_WS_ORIGIN=${OPENCLAW_GATEWAY_WS_ORIGIN:-http://localhost:18899}
      - OPENCLAW_EXTERNAL_BASE_MOUNT=${OPENCLAW_EXTERNAL_BASE_MOUNT:-/mnt/hokan}
      - OPENCLAW_STATE_DIR_HOST=${OPENCLAW_STATE_DIR_HOST:-/openclaw-state}
      - OPENCLAW_RUNTIME_LOG_ROOT_LOCAL=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:-/runtime/logs}
      - OPENCLAW_NODE_CONTEXT_SECRET=${OPENCLAW_NODE_CONTEXT_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - DISCORD_SECRET=${DISCORD_SECRET:-}
      - TELEGRAM_SECRET=${TELEGRAM_SECRET:-}
    container_name: bot-engine

  # Hokan the Bot io container
  bot-io:
    image: ghcr.io/petria/the_bot-io:${IO_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    depends_on:
      - bot-whatsapp
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://bot-openclaw:18889}
      - OPENCLAW_GATEWAY_WS_ORIGIN=${OPENCLAW_GATEWAY_WS_ORIGIN:-http://localhost:18899}
      - OPENCLAW_STATE_DIR_HOST=${OPENCLAW_STATE_DIR_HOST:-/openclaw-state}
      - OPENCLAW_RUNTIME_LOG_ROOT_LOCAL=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:-/runtime/logs}
      - OPENCLAW_NODE_CONTEXT_SECRET=${OPENCLAW_NODE_CONTEXT_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - DISCORD_SECRET=${DISCORD_SECRET:-}
      - TELEGRAM_SECRET=${TELEGRAM_SECRET:-}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET:-}
      - WHATSAPP_SEND_TOKEN=${WHATSAPP_SEND_TOKEN:-}
    container_name: bot-io

  # Hokan the Bot WhatsApp sidecar using wacli
  bot-whatsapp:
    image: ghcr.io/petria/the_bot-whatsapp:${WHATSAPP_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/${WHATSAPP_WACLI_DIR:-wacli-dev}:/wacli
    environment:
      - TZ=Europe/Helsinki
      - WACLI_STORE_DIR=/wacli
      - WACLI_WEBHOOK_URL=${WACLI_WEBHOOK_URL:-http://bot-io:8090/api/connections/whatsapp/webhook}
      - WACLI_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET:-}
      - WACLI_SYNC_MAX_DB_SIZE=${WACLI_SYNC_MAX_DB_SIZE:-2GB}
      - BOT_WHATSAPP_PORT=8095
      - BOT_WHATSAPP_SEND_TOKEN=${WHATSAPP_SEND_TOKEN:-}
    container_name: bot-whatsapp

  # Hokan the Bot web UI container
  bot-web:
    image: ghcr.io/petria/the_bot-web:${WEB_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    group_add:
      - "${DOCKER_GID:-989}"
    depends_on:
      - bot-engine
      - bot-io
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "0.0.0.0:8091:8091"
    extra_hosts:
      - "ubuntu-server:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
      - "ubuntu-server.local:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - THE_BOT_WEB_USERS_FILE=${THE_BOT_WEB_USERS_FILE:-/runtime/data/users.json}
      - THE_BOT_WEB_BOT_IO_BASE_URL=${THE_BOT_WEB_BOT_IO_BASE_URL:-http://bot-io:8090}
      - THE_BOT_WEB_BOT_ENGINE_BASE_URL=${THE_BOT_WEB_BOT_ENGINE_BASE_URL:-http://bot-engine:8100}
      - THE_BOT_WEB_DOCKER_STATUS_ENABLED=${THE_BOT_WEB_DOCKER_STATUS_ENABLED:-true}
      - THE_BOT_WEB_DOCKER_HOST=${THE_BOT_WEB_DOCKER_HOST:-unix:///var/run/docker.sock}
      - OPENCLAW_DEPLOYMENT_MODE=${OPENCLAW_DEPLOYMENT_MODE:-local}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://bot-openclaw:18889}
      - THE_BOT_WEB_OPENCLAW_HEALTH_URL=${THE_BOT_WEB_OPENCLAW_HEALTH_URL:-}
    container_name: bot-web

networks:
  default:
    driver: bridge
