services:
  # Hokan the Bot engine container
  bot-engine:
    image: ghcr.io/petria/the_bot-engine:${ENGINE_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
      - ${HOKAN_DATA_DIR:-.}/openclaw/state:/openclaw-state
    ports:
      - "127.0.0.1:8100:8100"
    extra_hosts:
      - "ubuntu-server:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
      - "ubuntu-server.local:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - THE_BOT_WEB_PUBLIC_BASE_URL=${THE_BOT_WEB_PUBLIC_BASE_URL:-http://localhost:8091}
      - THE_BOT_REST_BOT_WEB_BASE_URL=${THE_BOT_REST_BOT_WEB_BASE_URL:-http://bot-web:8091}
      - THE_BOT_INTERNAL_API_TOKEN=${THE_BOT_INTERNAL_API_TOKEN:-${HERMES_MANAGER_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}}
      - HOKAN_BOT_INSTANCE_ID=${HOKAN_BOT_INSTANCE_ID:-dev}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://ubuntu-server.local:18889}
      - OPENCLAW_GATEWAY_WS_ORIGIN=${OPENCLAW_GATEWAY_WS_ORIGIN:-http://ubuntu-server.local:18889}
      - OPENCLAW_EXTERNAL_BASE_MOUNT=${OPENCLAW_EXTERNAL_BASE_MOUNT:-/mnt/hokan}
      - OPENCLAW_STATE_DIR_HOST=${OPENCLAW_STATE_DIR_HOST:-/openclaw-state}
      - OPENCLAW_RUNTIME_LOG_ROOT_LOCAL=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:-/runtime/logs}
      - OPENCLAW_NODE_CONTEXT_SECRET=${OPENCLAW_NODE_CONTEXT_SECRET:-}
      - HERMES_CHAT_BASE_URL=${HERMES_CHAT_BASE_URL:-http://ubuntu-server.local:8643}
      - HERMES_CHAT_API_KEY=${HERMES_CHAT_API_KEY:-${HERMES_API_KEY:-}}
      - HERMES_AI_COMMAND_BASE_URL=${HERMES_AI_COMMAND_BASE_URL:-http://ubuntu-server.local:8645}
      - HERMES_AI_COMMAND_API_KEY=${HERMES_AI_COMMAND_API_KEY:-}
      - HERMES_AI_COMMAND_MODEL=${HERMES_AI_COMMAND_MODEL:-hermes-ai-command}
      - HERMES_AI_COMMAND_TIMEOUT_SECONDS=${HERMES_AI_COMMAND_TIMEOUT_SECONDS:-120}
      - HERMES_AI_COMMAND_API_MODE=${HERMES_AI_COMMAND_API_MODE:-chat-completions}
      - HERMES_CHAT_MODEL=${HERMES_CHAT_MODEL:-hermes-chat}
      - HERMES_CHAT_TIMEOUT_SECONDS=${HERMES_CHAT_TIMEOUT_SECONDS:-${HERMES_TIMEOUT_SECONDS:-120}}
      - HERMES_CHAT_API_MODE=${HERMES_CHAT_API_MODE:-responses}
      - HERMES_BASE_URL=${HERMES_BASE_URL:-${HERMES_CHAT_BASE_URL:-http://ubuntu-server.local:8643}}
      - HERMES_API_KEY=${HERMES_API_KEY:-${HERMES_CHAT_API_KEY:-}}
      - HERMES_MODEL=${HERMES_MODEL:-${HERMES_CHAT_MODEL:-hermes-chat}}
      - HERMES_TIMEOUT_SECONDS=${HERMES_TIMEOUT_SECONDS:-${HERMES_CHAT_TIMEOUT_SECONDS:-120}}
      - HERMES_API_MODE=${HERMES_API_MODE:-${HERMES_CHAT_API_MODE:-responses}}
      - THE_BOT_REST_HERMES_MANAGER_BASE_URL=${HERMES_MANAGER_BASE_URL:-${HERMES_MANAGER_MAIN_BASE_URL:-http://ubuntu-server.local:8651}}
      - THE_BOT_REST_HERMES_MANAGER_TOKEN=${HERMES_MANAGER_TOKEN:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - WEATHER_API_URL=${WEATHER_API_URL:-http://api.weatherapi.com/v1}
      - DISCORD_SECRET=${DISCORD_SECRET:-}
      - TELEGRAM_SECRET=${TELEGRAM_SECRET:-}
    container_name: bot-engine

  # Hokan the Bot io container
  bot-io:
    image: ghcr.io/petria/the_bot-io:${IO_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    depends_on:
      - bot-whatsapp
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://ubuntu-server.local:18889}
      - OPENCLAW_GATEWAY_WS_ORIGIN=${OPENCLAW_GATEWAY_WS_ORIGIN:-http://ubuntu-server.local:18889}
      - OPENCLAW_STATE_DIR_HOST=${OPENCLAW_STATE_DIR_HOST:-/openclaw-state}
      - OPENCLAW_RUNTIME_LOG_ROOT_LOCAL=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:-/runtime/logs}
      - OPENCLAW_NODE_CONTEXT_SECRET=${OPENCLAW_NODE_CONTEXT_SECRET:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - DISCORD_SECRET=${DISCORD_SECRET:-}
      - TELEGRAM_SECRET=${TELEGRAM_SECRET:-}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET:-}
      - WHATSAPP_SEND_TOKEN=${WHATSAPP_SEND_TOKEN:-}
    container_name: bot-io

  # Hokan the Bot WhatsApp sidecar using wacli
  bot-whatsapp:
    image: ghcr.io/petria/the_bot-whatsapp:${WHATSAPP_IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/${WHATSAPP_WACLI_DIR:-wacli-dev}:/wacli
    environment:
      - TZ=Europe/Helsinki
      - WACLI_STORE_DIR=/wacli
      - WACLI_WEBHOOK_URL=${WACLI_WEBHOOK_URL:-http://bot-io:8090/api/connections/whatsapp/webhook}
      - WACLI_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET:-}
      - WACLI_SYNC_MAX_DB_SIZE=${WACLI_SYNC_MAX_DB_SIZE:-2GB}
      - BOT_WHATSAPP_PORT=8095
      - BOT_WHATSAPP_SEND_TOKEN=${WHATSAPP_SEND_TOKEN:-}
    container_name: bot-whatsapp

  # Hokan the Bot web UI container
  bot-web:
    image: ghcr.io/petria/the_bot-web:${WEB_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    group_add:
      - "${DOCKER_GID:-989}"
    depends_on:
      - bot-engine
      - bot-io
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "0.0.0.0:8091:8091"
    extra_hosts:
      - "ubuntu-server:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
      - "ubuntu-server.local:${OPENCLAW_EXTERNAL_HOST_IP:-192.168.0.11}"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - THE_BOT_WEB_USERS_FILE=${THE_BOT_WEB_USERS_FILE:-/runtime/data/users.json}
      - THE_BOT_WEB_BOT_IO_BASE_URL=${THE_BOT_WEB_BOT_IO_BASE_URL:-http://bot-io:8090}
      - THE_BOT_WEB_BOT_ENGINE_BASE_URL=${THE_BOT_WEB_BOT_ENGINE_BASE_URL:-http://bot-engine:8100}
      - THE_BOT_WEB_DOCKER_STATUS_ENABLED=${THE_BOT_WEB_DOCKER_STATUS_ENABLED:-true}
      - THE_BOT_WEB_DOCKER_HOST=${THE_BOT_WEB_DOCKER_HOST:-unix:///var/run/docker.sock}
      - THE_BOT_INTERNAL_API_TOKEN=${THE_BOT_INTERNAL_API_TOKEN:-${HERMES_MANAGER_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}}
      - OPENCLAW_DEPLOYMENT_MODE=${OPENCLAW_DEPLOYMENT_MODE:-external}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://ubuntu-server.local:18889}
      - THE_BOT_WEB_OPENCLAW_HEALTH_URL=${THE_BOT_WEB_OPENCLAW_HEALTH_URL:-}
    container_name: bot-web

  # Hokan the Bot Hermes Manager - Main instance
  bot-hermes-manager-main:
    image: ghcr.io/petria/the_bot-hermes-manager:${HERMES_MANAGER_IMAGE_TAG:-latest}
    container_name: bot-hermes-manager-main
    restart: unless-stopped
    user: "${PUID:-1002}:${PGID:-1002}"
    group_add:
      - "${DOCKER_GID:-989}"
    network_mode: host
    volumes:
      - ${HERMES_MANAGER_MAIN_STATE_DIR:-/home/hokan/bot-hermes/data-main}:/hermes-data
      - ${HERMES_MAIN_PROFILES_DIR:-/home/hokan/bot-hermes/main/data/profiles}:/hermes-data/profiles
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Helsinki
      - HERMES_MANAGER_DATA_DIR=/hermes-data
      - HERMES_CONTAINER_NAME=${HERMES_MAIN_CONTAINER_NAME:-bot-hermes-main}
      - HERMES_MANAGER_PROFILE_PORTS=chat:8643,ai-command:8645
      - HERMES_MANAGER_TOKEN=${HERMES_MANAGER_MAIN_TOKEN:-${HERMES_MANAGER_TOKEN}}
      - HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS=${HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS:-180}
      - HERMES_FALLBACK_BASE_URL=${HERMES_FALLBACK_BASE_URL:-http://192.168.0.55:11434/v1}
      - HERMES_FALLBACK_MODEL=${HERMES_FALLBACK_MODEL:-qwen3.6:35b-a3b}

  # Hokan the Bot Hermes Manager - Develop instance
  bot-hermes-manager-develop:
    image: ghcr.io/petria/the_bot-hermes-manager:${HERMES_MANAGER_IMAGE_TAG:-latest}
    container_name: bot-hermes-manager-develop
    restart: unless-stopped
    user: "${PUID:-1002}:${PGID:-1002}"
    group_add:
      - "${DOCKER_GID:-989}"
    network_mode: host
    volumes:
      - ${HERMES_MANAGER_DEVELOP_STATE_DIR:-/home/hokan/bot-hermes/data-develop}:/hermes-data-dev
      - ${HERMES_DEVELOP_PROFILES_DIR:-/home/hokan/bot-hermes/develop/data/profiles}:/hermes-data-dev/profiles
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Helsinki
      - HERMES_MANAGER_DATA_DIR=/hermes-data-dev
      - HERMES_CONTAINER_NAME=${HERMES_DEVELOP_CONTAINER_NAME:-bot-hermes-develop}
      - HERMES_MANAGER_PROFILE_PORTS=chat:8663,ai-command:8665
      - HERMES_MANAGER_TOKEN=${HERMES_MANAGER_DEVELOP_TOKEN:-${HERMES_MANAGER_TOKEN}}
      - HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS=${HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS:-180}
      - HERMES_FALLBACK_BASE_URL=${HERMES_FALLBACK_BASE_URL:-http://192.168.0.55:11434/v1}
      - HERMES_FALLBACK_MODEL=${HERMES_FALLBACK_MODEL:-qwen3.6:35b-a3b}

networks:
  default:
    driver: bridge
