services:
  # Hokan dedicated OpenClaw container
  bot-openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/openclaw/state:/state
      - ${HOKAN_DATA_DIR:-.}/openclaw/workspace:/workspace
      - ${HOKAN_DATA_DIR:-.}/openclaw/config:/config
      - ${HOKAN_DATA_DIR:-.}/openclaw/logs:/logs
      - ${HOKAN_DATA_DIR:-.}/runtime:/workspace/runtime
    ports:
      - "127.0.0.1:${OPENCLAW_HOST_PORT:-18899}:18889"
    environment:
      - TZ=Europe/Helsinki
      - HOME=/state
      - NPM_CONFIG_CACHE=/state/.npm
      - XDG_CACHE_HOME=/state/.cache
      - OPENCLAW_STATE_DIR=/state
      - OPENCLAW_WORKSPACE_DIR=/workspace
      - OPENCLAW_CONFIG_PATH=/config/config.json
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
    container_name: bot-openclaw

  # Hokan the Bot engine container
  bot-engine:
    image: ghcr.io/petria/the_bot-engine:${ENGINE_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    depends_on:
      - bot-openclaw
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
      - ${HOKAN_DATA_DIR:-.}/openclaw/state:/openclaw-state
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://bot-openclaw:18889}
      - OPENCLAW_GATEWAY_WS_ORIGIN=${OPENCLAW_GATEWAY_WS_ORIGIN:-http://localhost:18899}
      - OPENCLAW_STATE_DIR_HOST=${OPENCLAW_STATE_DIR_HOST:-/openclaw-state}
      - OPENCLAW_RUNTIME_LOG_ROOT_LOCAL=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:-/runtime/logs}
      - OPENCLAW_NODE_CONTEXT_SECRET=${OPENCLAW_NODE_CONTEXT_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - SLACK_TOKEN_SECRET=${SLACK_TOKEN_SECRET:-}
      - DISCORD_SECRET=${DISCORD_SECRET:-}
      - TELEGRAM_SECRET=${TELEGRAM_SECRET:-}
    container_name: bot-engine

  # Hokan the Bot io container
  bot-io:
    image: ghcr.io/petria/the_bot-io:${IO_IMAGE_TAG:-latest}
    user: "${PUID}:${PGID}"
    volumes:
      - ${HOKAN_DATA_DIR:-.}/runtime:/runtime
      - ${HOKAN_DATA_DIR:-.}/config:/config
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - TZ=Europe/Helsinki
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - BOT_CONFIG_FILE=${BOT_CONFIG_FILE:-/runtime/dev.properties}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-${OPENCLAW_HOOKS_TOKEN:-}}
      - OPENCLAW_GATEWAY_WS_URL=${OPENCLAW_GATEWAY_WS_URL:-ws://bot-openclaw:18889}
      - OPENCLAW_GATEWAY_WS_ORIGIN=${OPENCLAW_GATEWAY_WS_ORIGIN:-http://localhost:18899}
      - OPENCLAW_STATE_DIR_HOST=${OPENCLAW_STATE_DIR_HOST:-/openclaw-state}
      - OPENCLAW_RUNTIME_LOG_ROOT_LOCAL=${OPENCLAW_RUNTIME_LOG_ROOT_LOCAL:-/runtime/logs}
      - OPENCLAW_NODE_CONTEXT_SECRET=${OPENCLAW_NODE_CONTEXT_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - SLACK_TOKEN_SECRET=${SLACK_TOKEN_SECRET:-}
      - DISCORD_SECRET=${DISCORD_SECRET:-}
      - TELEGRAM_SECRET=${TELEGRAM_SECRET:-}
    container_name: bot-io

networks:
  default:
    driver: bridge
