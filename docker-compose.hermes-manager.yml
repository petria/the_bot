services:
  bot-hermes-manager-main:
    image: ghcr.io/petria/the_bot-hermes-manager:${HERMES_MANAGER_IMAGE_TAG:-latest}
    container_name: bot-hermes-manager-main
    restart: unless-stopped
    user: "${PUID:-1001}:${PGID:-1001}"
    group_add:
      - "${DOCKER_GID:-107}"
    network_mode: host
    volumes:
      - ${HERMES_MANAGER_MAIN_STATE_DIR:-/home/hokan/bot-hermes/data-main}:/hermes-data-main
      - ${HERMES_MAIN_PROFILES_DIR:-/home/hokan/bot-hermes/main/data/profiles}:/hermes-data-main/profiles
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Helsinki
      - SERVER_PORT=8651
      - HERMES_MANAGER_DATA_DIR=/hermes-data-main
      - HERMES_CONTAINER_NAME=${HERMES_MAIN_CONTAINER_NAME:-bot-hermes-main}
      - HERMES_MANAGER_PROFILE_PORTS=chat:8643,coder:8644,ai-command:8645
      - HERMES_MANAGER_TOKEN=${HERMES_MANAGER_MAIN_TOKEN:-${HERMES_MANAGER_TOKEN}}
      - HERMES_MANAGER_LOCAL_CREDENTIAL_KEY=${HERMES_MANAGER_MAIN_LOCAL_CREDENTIAL_KEY:-${HERMES_MANAGER_LOCAL_CREDENTIAL_KEY:-}}
      - HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS=${HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS:-180}
      - HERMES_FALLBACK_BASE_URL=${HERMES_FALLBACK_BASE_URL:-http://192.168.0.55:11434/v1}
      - HERMES_FALLBACK_MODEL=${HERMES_FALLBACK_MODEL:-qwen3.6:35b-a3b}

  bot-hermes-manager-develop:
    image: ghcr.io/petria/the_bot-hermes-manager:${HERMES_MANAGER_IMAGE_TAG:-develop}
    container_name: bot-hermes-manager-develop
    restart: unless-stopped
    user: "${PUID:-1001}:${PGID:-1001}"
    group_add:
      - "${DOCKER_GID:-107}"
    network_mode: host
    volumes:
      - ${HERMES_MANAGER_DEVELOP_STATE_DIR:-/home/hokan/bot-hermes/data-develop}:/hermes-data-develop
      - ${HERMES_DEVELOP_PROFILES_DIR:-/home/hokan/bot-hermes/develop/data/profiles}:/hermes-data-develop/profiles
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Helsinki
      - SERVER_PORT=8652
      - HERMES_MANAGER_DATA_DIR=/hermes-data-develop
      - HERMES_CONTAINER_NAME=${HERMES_DEVELOP_CONTAINER_NAME:-bot-hermes-develop}
      - HERMES_MANAGER_PROFILE_PORTS=chat:8663,coder:8664,ai-command:8665
      - HERMES_MANAGER_TOKEN=${HERMES_MANAGER_DEVELOP_TOKEN:-${HERMES_MANAGER_TOKEN}}
      - HERMES_MANAGER_LOCAL_CREDENTIAL_KEY=${HERMES_MANAGER_DEVELOP_LOCAL_CREDENTIAL_KEY:-${HERMES_MANAGER_LOCAL_CREDENTIAL_KEY:-}}
      - HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS=${HERMES_MANAGER_LOCAL_VALIDATION_TIMEOUT_SECONDS:-180}
      - HERMES_FALLBACK_BASE_URL=${HERMES_FALLBACK_BASE_URL:-http://192.168.0.55:11434/v1}
      - HERMES_FALLBACK_MODEL=${HERMES_FALLBACK_MODEL:-qwen3.6:35b-a3b}
